  else if (text.indexOf('好きなこと') !== -1)       a.classList.add('tag-sukina');
  else if (text.indexOf('クレジットカード') !== -1)  a.classList.add('tag-sukina');
  else if (text.indexOf('ヒルトン') !== -1)          a.classList.add('tag-sukina');
  else if (text.indexOf('旅行') !== -1)              a.classList.add('tag-sukina');
  else if (text.indexOf('お金') !== -1)              a.classList.add('tag-sukina');
  else if (text.indexOf('ROKU KYOTO') !== -1)        a.classList.add('tag-sukina');
  else if (text.indexOf('京都ホテル') !== -1)          a.classList.add('tag-sukina');
  else if (text.indexOf('ラグジュアリーホテル') !== -1) a.classList.add('tag-sukina');
  else if (text.indexOf('ウォルドーフ') !== -1)         a.classList.add('tag-sukina');
  else if (text.indexOf('大阪ホテル') !== -1)            a.classList.add('tag-sukina');
});
</script>

<script>
document.querySelectorAll('.photo-pair img').forEach(function(img) {
  img.addEventListener('click', function() {
    var overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay';
    var full = document.createElement('img');
    full.src = img.src;
    full.alt = img.alt;
    overlay.appendChild(full);
    overlay.addEventListener('click', function() { overlay.remove(); });
    document.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
    });
    document.body.appendChild(overlay);
  });
});
</script>
